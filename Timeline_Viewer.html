<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis Pipe — Timeline</title>
  <style>
    :root {
      --annual-color:  #7C3AED;
      --monthly-color: #0EA5E9;
      --weekly-color:  #10B981;
      --daily-color:   #94A3B8;
      --bg: #020817;
      --surface: #0d1526;
      --border: #1e3a6e;
      --text: #e8edf8;
      --muted: #8899bb;
      --gold: #f0c040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(2,8,23,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--gold); border-color: var(--gold); }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn[data-level="all"].active    { color: var(--text);           border-color: var(--text);           background: rgba(232,237,248,0.08); }
    .filter-btn[data-level="Annual"].active  { color: var(--annual-color);  border-color: var(--annual-color);  background: rgba(124,58,237,0.15); }
    .filter-btn[data-level="Monthly"].active { color: var(--monthly-color); border-color: var(--monthly-color); background: rgba(14,165,233,0.15); }
    .filter-btn[data-level="Weekly"].active  { color: var(--weekly-color);  border-color: var(--weekly-color);  background: rgba(16,185,129,0.15); }
    .filter-btn[data-level="Daily"].active   { color: var(--daily-color);   border-color: var(--daily-color);   background: rgba(148,163,184,0.12); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .count-label {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── エラー/未設定バナー ── */
    #notice {
      display: none;
      margin: 20px auto;
      max-width: 500px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    #notice a {
      color: var(--gold);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }

    /* ── タイムライン ── */
    #timeline {
      max-width: 740px;
      margin: 0 auto;
      padding: 36px 20px 80px;
      position: relative;
    }

    #timeline::before {
      content: '';
      position: absolute;
      left: 36px;
      top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--border) 4%, var(--border) 96%, transparent);
    }

    .entry {
      position: relative;
      padding-left: 64px;
      margin-bottom: 20px;
      animation: fadeIn 0.35s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dot {
      position: absolute;
      left: 27px;
      top: 15px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .entry[data-level="Annual"]  .dot { background: var(--annual-color); }
    .entry[data-level="Monthly"] .dot { background: var(--monthly-color); }
    .entry[data-level="Weekly"]  .dot { background: var(--weekly-color); }
    .entry[data-level="Daily"]   .dot { background: var(--daily-color); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }

    .entry[data-level="Annual"]  .card::before { background: var(--annual-color); }
    .entry[data-level="Monthly"] .card::before { background: var(--monthly-color); }
    .entry[data-level="Weekly"]  .card::before { background: var(--weekly-color); }
    .entry[data-level="Daily"]   .card::before { background: var(--daily-color); }

    .entry[data-level="Annual"]  .card { padding: 18px 22px; }
    .entry[data-level="Monthly"] .card { padding: 16px 20px; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .level-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .entry[data-level="Annual"]  .level-badge { background: rgba(124,58,237,0.2);  color: #a78bfa; }
    .entry[data-level="Monthly"] .level-badge { background: rgba(14,165,233,0.2);  color: #38bdf8; }
    .entry[data-level="Weekly"]  .level-badge { background: rgba(16,185,129,0.2);  color: #34d399; }
    .entry[data-level="Daily"]   .level-badge { background: rgba(148,163,184,0.15); color: #94a3b8; }

    .date-label {
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }

    .summary-text {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── ログ展開セクション ── */
    .log-section {
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 4px;
    }

    .log-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 4px;
      transition: color 0.2s;
    }
    .log-toggle:hover { color: var(--gold); }

    .log-text {
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      white-space: pre-wrap;
      display: none;
    }
    .log-text.open { display: block; }

    /* ── ローディング ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 14px;
      color: var(--muted);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="goBack()">← チャット</button>
  <span class="header-title">⏱ Genesis Timeline</span>
  <div class="filters">
    <button class="filter-btn active" data-level="all"     onclick="setFilter('all')">ALL</button>
    <button class="filter-btn"        data-level="Annual"  onclick="setFilter('Annual')">Annual</button>
    <button class="filter-btn"        data-level="Monthly" onclick="setFilter('Monthly')">Monthly</button>
    <button class="filter-btn"        data-level="Weekly"  onclick="setFilter('Weekly')">Weekly</button>
    <button class="filter-btn"        data-level="Daily"   onclick="setFilter('Daily')">Daily</button>
  </div>
  <div class="header-right">
    <span class="count-label" id="count-label"></span>
  </div>
</header>

<div id="notice"></div>

<div id="timeline">
  <div id="loading">
    <div class="spinner"></div>
    <span>Genesis ログを読み込み中...</span>
  </div>
</div>

<script>
  const GP_STORAGE_KEY = 'gp_public_v1';
  let allEntries = [];
  let currentFilter = 'all';

  function loadStorage() {
    try { return JSON.parse(localStorage.getItem(GP_STORAGE_KEY) || '{}'); } catch(e) { return {}; }
  }

  // ── 初期化 ──────────────────────────────────
  window.onload = function() {
    const gasUrl = loadStorage().webAppUrl || '';
    if (!gasUrl || !gasUrl.includes('/macros/s/')) {
      showNotice(
        'Genesis Pipe の GAS URL が未設定です。<br>' +
        '<a onclick="goBack()">← チャット画面</a> の ⚙️ 設定から GAS URL を入力してください。'
      );
      return;
    }
    loadData(gasUrl);
  };

  function loadData(gasUrl) {
    fetch(gasUrl + '?page=timeline_data', { redirect: 'follow' })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(onDataLoaded)
      .catch(function(e) {
        document.getElementById('loading').innerHTML =
          '<p style="color:#f87171;text-align:center;padding:20px;">' +
          '読み込みエラー: ' + (e.message || String(e)) + '<br><br>' +
          '<span style="font-size:11px;color:var(--muted)">GAS を再デプロイしてから試してください</span></p>';
      });
  }

  function onDataLoaded(rawData) {
    // Genesis Pipe 形式 → 表示形式に変換
    // rawData: [{date, stamp, type, log, summary}]
    const raw = Array.isArray(rawData) ? rawData
      : (typeof rawData === 'string' ? JSON.parse(rawData) : []);

    allEntries = raw.map(function(e) {
      return {
        level:  e.type === 'Yearly' ? 'Annual' : (e.type || 'Daily'),
        date:   e.date || '',
        stamp:  (e.stamp || '').replace(/^(Daily|Weekly|Monthly|Yearly)_/, ''),
        text:   e.log || '',
      };
    });

    render();
  }

  function showNotice(html) {
    document.getElementById('loading').style.display = 'none';
    const n = document.getElementById('notice');
    n.innerHTML = html;
    n.style.display = 'block';
  }

  function goBack() {
    window.location.href = './index.html';
  }

  // ── フィルター ───────────────────────────────
  function setFilter(level) {
    currentFilter = level;
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.level === level);
    });
    render();
  }

  // ── レンダリング ─────────────────────────────
  function render() {
    const container = document.getElementById('timeline');
    const filtered = currentFilter === 'all'
      ? allEntries
      : allEntries.filter(function(e) { return e.level === currentFilter; });

    document.getElementById('count-label').textContent = filtered.length + ' 件';

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">該当するログがありません</div>';
      return;
    }

    container.innerHTML = filtered.map(function(e, i) { return buildCard(e, i); }).join('');
  }

  // ── カード生成 ───────────────────────────────
  function buildCard(e, i) {
    const delay   = Math.min(i * 25, 500);
    const logId   = 'log-' + i;
    const preview = e.text.replace(/^[^\n]*\n+/, '').substring(0, 120);
    const full    = e.text;

    return '<div class="entry" data-level="' + e.level + '" style="animation-delay:' + delay + 'ms">' +
      '<div class="dot"></div>' +
      '<div class="card">' +
        '<div class="card-header">' +
          '<span class="level-badge">' + e.level + '</span>' +
          '<span class="date-label">' + esc(e.stamp || e.date) + '</span>' +
        '</div>' +
        (preview ? '<p class="summary-text">' + esc(preview) + (full.length > 120 ? '…' : '') + '</p>' : '') +
        (full ? (
          '<div class="log-section">' +
            '<button class="log-toggle" onclick="toggleLog(\'' + logId + '\',this)">' +
              '▶ 全文を表示' +
            '</button>' +
            '<p class="log-text" id="' + logId + '">' + esc(full) + '</p>' +
          '</div>'
        ) : '') +
      '</div>' +
    '</div>';
  }

  function toggleLog(id, btn) {
    const el = document.getElementById(id);
    if (el.classList.toggle('open')) {
      btn.textContent = '▼ 閉じる';
    } else {
      btn.textContent = '▶ 全文を表示';
    }
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
