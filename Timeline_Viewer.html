<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Partner Sync — Timeline</title>
  <style>
    :root {
      --annual-color:  #7C3AED;
      --monthly-color: #0EA5E9;
      --weekly-color:  #10B981;
      --daily-color:   #94A3B8;
      --bg: #0F172A;
      --surface: #1E293B;
      --border: #334155;
      --text: #E2E8F0;
      --muted: #94A3B8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #F8FAFC;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: #fff;
      border-color: currentColor;
    }

    .filter-btn[data-level="all"].active    { color: #F8FAFC; border-color: #F8FAFC; background: #1E293B; }
    .filter-btn[data-level="Annual"].active  { color: var(--annual-color);  border-color: var(--annual-color);  background: rgba(124,58,237,0.15); }
    .filter-btn[data-level="Monthly"].active { color: var(--monthly-color); border-color: var(--monthly-color); background: rgba(14,165,233,0.15); }
    .filter-btn[data-level="Weekly"].active  { color: var(--weekly-color);  border-color: var(--weekly-color);  background: rgba(16,185,129,0.15); }
    .filter-btn[data-level="Daily"].active   { color: var(--daily-color);   border-color: var(--daily-color);   background: rgba(148,163,184,0.15); }

    /* ── タイムライン ── */
    #timeline {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
    }

    #timeline::before {
      content: '';
      position: absolute;
      left: 40px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--border) 5%, var(--border) 95%, transparent);
    }

    /* ── カード共通 ── */
    .entry {
      position: relative;
      padding-left: 72px;
      margin-bottom: 24px;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry.hidden { display: none; }

    /* ドット */
    .dot {
      position: absolute;
      left: 32px;
      top: 16px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
    }

    /* レベルごとの左ボーダー色 */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }

    .entry[data-level="Annual"]  .dot       { background: var(--annual-color); }
    .entry[data-level="Monthly"] .dot       { background: var(--monthly-color); }
    .entry[data-level="Weekly"]  .dot       { background: var(--weekly-color); }
    .entry[data-level="Daily"]   .dot       { background: var(--daily-color); }

    .entry[data-level="Annual"]  .card::before { background: var(--annual-color); }
    .entry[data-level="Monthly"] .card::before { background: var(--monthly-color); }
    .entry[data-level="Weekly"]  .card::before { background: var(--weekly-color); }
    .entry[data-level="Daily"]   .card::before { background: var(--daily-color); }

    /* カードサイズ */
    .entry[data-level="Annual"]  .card { padding: 20px 24px; }
    .entry[data-level="Monthly"] .card { padding: 18px 22px; }
    .entry[data-level="Daily"]   .card { opacity: 0.85; }

    /* ── カード内パーツ ── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .level-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .entry[data-level="Annual"]  .level-badge { background: rgba(124,58,237,0.25); color: #A78BFA; }
    .entry[data-level="Monthly"] .level-badge { background: rgba(14,165,233,0.25); color: #38BDF8; }
    .entry[data-level="Weekly"]  .level-badge { background: rgba(16,185,129,0.25); color: #34D399; }
    .entry[data-level="Daily"]   .level-badge { background: rgba(148,163,184,0.15); color: #94A3B8; }

    .date-label {
      font-size: 12px;
      color: var(--muted);
    }

    .emotion-chip {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
    }

    .summary {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 10px;
    }

    .section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .section-text {
      font-size: 12px;
      line-height: 1.65;
      color: #CBD5E1;
      white-space: pre-wrap;
    }

    .keystone {
      font-size: 13px;
      font-style: italic;
      color: #FCD34D;
      line-height: 1.65;
    }

    .aphorism {
      font-size: 13px;
      font-style: italic;
      color: #A78BFA;
      line-height: 1.65;
    }

    /* ── ローディング ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--weekly-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>⏱ AI Partner Sync Timeline</h1>
  <div class="filters">
    <button class="filter-btn active" data-level="all"     onclick="setFilter('all')">ALL</button>
    <button class="filter-btn"        data-level="Annual"  onclick="setFilter('Annual')">Annual</button>
    <button class="filter-btn"        data-level="Monthly" onclick="setFilter('Monthly')">Monthly</button>
    <button class="filter-btn"        data-level="Weekly"  onclick="setFilter('Weekly')">Weekly</button>
    <button class="filter-btn"        data-level="Daily"   onclick="setFilter('Daily')">Daily</button>
  </div>
</header>

<div id="timeline">
  <div id="loading">
    <div class="spinner"></div>
    <span>データ読み込み中...</span>
  </div>
</div>

<script>
  let allEntries = [];
  let currentFilter = 'all';

  // ── 初期化 ──────────────────────────────────
  window.onload = function() {
    google.script.run
      .withSuccessHandler(onDataLoaded)
      .withFailureHandler(onError)
      .getTimelineData();
  };

  function onDataLoaded(json) {
    allEntries = JSON.parse(json);
    render();
  }

  function onError(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#F87171">エラー: ' + e.message + '</p>';
  }

  // ── フィルター ───────────────────────────────
  function setFilter(level) {
    currentFilter = level;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.level === level);
    });
    render();
  }

  // ── レンダリング ─────────────────────────────
  function render() {
    const container = document.getElementById('timeline');
    const filtered = currentFilter === 'all'
      ? allEntries
      : allEntries.filter(e => e.level === currentFilter);

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">表示できるエントリーがありません</div>';
      return;
    }

    container.innerHTML = filtered.map((e, i) => buildCard(e, i)).join('');
  }

  // ── カード生成 ───────────────────────────────
  function buildCard(e, i) {
    const delay = Math.min(i * 30, 400);
    let inner = '';

    // ヘッダー（全レベル共通）
    inner += `
      <div class="card-header">
        <span class="level-badge">${e.level}</span>
        <span class="date-label">${e.date_range || e.date || e.id || ''}</span>
        ${e.emotion ? `<span class="emotion-chip">${e.emotion}</span>` : ''}
      </div>`;

    // Summary
    if (e.summary) {
      inner += `<p class="summary">${esc(e.summary)}</p>`;
    }

    // Keystone Insight（全レベル）
    if (e.keystone) {
      inner += `
        <div class="section">
          <div class="section-label">💡 Keystone Insight</div>
          <p class="keystone">${esc(e.keystone)}</p>
        </div>`;
    }

    // Weekly 追加フィールド
    if (e.level === 'Weekly' || e.level === 'Monthly') {
      if (e.top3_plan) {
        inner += `
          <div class="section">
            <div class="section-label">🎯 Top3 Plan</div>
            <p class="section-text">${esc(e.top3_plan)}</p>
          </div>`;
      }
      if (e.top3_actual) {
        inner += `
          <div class="section">
            <div class="section-label">✅ Top3 Actual</div>
            <p class="section-text">${esc(e.top3_actual)}</p>
          </div>`;
      }
      if (e.aphorism) {
        inner += `
          <div class="section">
            <div class="section-label">✨ Aphorism Candidate</div>
            <p class="aphorism">"${esc(e.aphorism)}"</p>
          </div>`;
      }
    }

    // Monthly 追加フィールド
    if (e.level === 'Monthly') {
      if (e.major_breakthrough) {
        inner += `
          <div class="section">
            <div class="section-label">🚀 Major Breakthrough</div>
            <p class="section-text">${esc(e.major_breakthrough)}</p>
          </div>`;
      }
      if (e.identity_evolution) {
        inner += `
          <div class="section">
            <div class="section-label">🦋 Identity Evolution</div>
            <p class="section-text">${esc(e.identity_evolution)}</p>
          </div>`;
      }
      if (e.teaching) {
        inner += `
          <div class="section">
            <div class="section-label">📖 Teaching</div>
            <p class="section-text">${esc(e.teaching)}</p>
          </div>`;
      }
    }

    // Annual 追加フィールド
    if (e.level === 'Annual') {
      if (e.year_philosophy) {
        inner += `
          <div class="section">
            <div class="section-label">🌍 Year Philosophy</div>
            <p class="section-text">${esc(e.year_philosophy)}</p>
          </div>`;
      }
      if (e.aphorisms_confirmed) {
        inner += `
          <div class="section">
            <div class="section-label">💎 Aphorisms Confirmed</div>
            <p class="aphorism">${esc(e.aphorisms_confirmed)}</p>
          </div>`;
      }
      if (e.legacy_testament) {
        inner += `
          <div class="section">
            <div class="section-label">🏛 Legacy Testament</div>
            <p class="section-text">${esc(e.legacy_testament)}</p>
          </div>`;
      }
    }

    return `
      <div class="entry" data-level="${e.level}" style="animation-delay:${delay}ms">
        <div class="dot"></div>
        <div class="card">${inner}</div>
      </div>`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
