<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Partner Sync — Timeline</title>
  <style>
    :root {
      --annual-color:  #7C3AED;
      --monthly-color: #0EA5E9;
      --weekly-color:  #10B981;
      --daily-color:   #94A3B8;
      --bg: #0F172A;
      --surface: #1E293B;
      --border: #334155;
      --text: #E2E8F0;
      --muted: #94A3B8;
      --gold: #F0C040;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover { color: var(--gold); border-color: var(--gold); }

    header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #F8FAFC;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: #fff;
      border-color: currentColor;
    }

    .filter-btn[data-level="all"].active    { color: #F8FAFC; border-color: #F8FAFC; background: #1E293B; }
    .filter-btn[data-level="Annual"].active  { color: var(--annual-color);  border-color: var(--annual-color);  background: rgba(124,58,237,0.15); }
    .filter-btn[data-level="Monthly"].active { color: var(--monthly-color); border-color: var(--monthly-color); background: rgba(14,165,233,0.15); }
    .filter-btn[data-level="Weekly"].active  { color: var(--weekly-color);  border-color: var(--weekly-color);  background: rgba(16,185,129,0.15); }
    .filter-btn[data-level="Daily"].active   { color: var(--daily-color);   border-color: var(--daily-color);   background: rgba(148,163,184,0.15); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .count-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .url-settings-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .url-settings-btn:hover { color: var(--gold); }

    /* ── URL 初期設定オーバーレイ ── */
    #url-setup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.96);
      z-index: 200;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    .url-setup-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 340px;
      max-width: 92vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }

    .url-setup-modal h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--weekly-color);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .url-setup-modal p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.65;
    }

    .url-setup-step {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .url-setup-input {
      width: 100%;
      padding: 11px 13px;
      font-size: 12px;
      background: rgba(15,23,42,0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: monospace;
      box-sizing: border-box;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-setup-input:focus { border-color: var(--weekly-color); }
    .url-setup-input::placeholder { color: rgba(148,163,184,0.4); font-family: sans-serif; }

    .url-setup-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--weekly-color);
      color: #0F172A;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .url-setup-btn:hover { opacity: 0.88; }
    .url-setup-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .url-setup-back {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .url-setup-back:hover { color: var(--text); }

    /* ── タイムライン ── */
    #timeline {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
    }

    #timeline::before {
      content: '';
      position: absolute;
      left: 40px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--border) 5%, var(--border) 95%, transparent);
    }

    /* ── カード共通 ── */
    .entry {
      position: relative;
      padding-left: 72px;
      margin-bottom: 24px;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry.hidden { display: none; }

    .dot {
      position: absolute;
      left: 32px;
      top: 16px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }

    .entry[data-level="Annual"]  .dot       { background: var(--annual-color); }
    .entry[data-level="Monthly"] .dot       { background: var(--monthly-color); }
    .entry[data-level="Weekly"]  .dot       { background: var(--weekly-color); }
    .entry[data-level="Daily"]   .dot       { background: var(--daily-color); }

    .entry[data-level="Annual"]  .card::before { background: var(--annual-color); }
    .entry[data-level="Monthly"] .card::before { background: var(--monthly-color); }
    .entry[data-level="Weekly"]  .card::before { background: var(--weekly-color); }
    .entry[data-level="Daily"]   .card::before { background: var(--daily-color); }

    .entry[data-level="Annual"]  .card { padding: 20px 24px; }
    .entry[data-level="Monthly"] .card { padding: 18px 22px; }
    .entry[data-level="Daily"]   .card { opacity: 0.85; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .level-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .entry[data-level="Annual"]  .level-badge { background: rgba(124,58,237,0.25); color: #A78BFA; }
    .entry[data-level="Monthly"] .level-badge { background: rgba(14,165,233,0.25); color: #38BDF8; }
    .entry[data-level="Weekly"]  .level-badge { background: rgba(16,185,129,0.25); color: #34D399; }
    .entry[data-level="Daily"]   .level-badge { background: rgba(148,163,184,0.15); color: #94A3B8; }

    .date-label { font-size: 12px; color: var(--muted); }

    .emotion-chip {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
    }

    .summary {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 10px;
    }

    .section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .section-text {
      font-size: 12px;
      line-height: 1.65;
      color: #CBD5E1;
      white-space: pre-wrap;
    }

    .keystone {
      font-size: 13px;
      font-style: italic;
      color: #FCD34D;
      line-height: 1.65;
    }

    .aphorism {
      font-size: 13px;
      font-style: italic;
      color: #A78BFA;
      line-height: 1.65;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--weekly-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- URL 初期設定オーバーレイ -->
<div id="url-setup">
  <div class="url-setup-modal">
    <h3>⏱ Timeline 接続設定</h3>
    <p>AI Partner Sync Engine の GAS ウェブアプリ URL を入力してください。<br>一度設定すると次回から自動接続されます。</p>
    <div class="url-setup-step">GAS ウェブアプリ URL（/exec で終わるURL）</div>
    <input type="url" id="setup-url-input" class="url-setup-input"
           placeholder="https://script.google.com/macros/s/.../exec">
    <button class="url-setup-btn" id="setup-connect-btn" onclick="saveUrlSetup()">接続する</button>
    <span class="url-setup-back" onclick="goBack()">← Genesis Pipe チャットに戻る</span>
  </div>
</div>

<header>
  <button class="back-btn" onclick="goBack()">← チャット</button>
  <h1>⏱ AI Partner Sync Timeline</h1>
  <div class="filters">
    <button class="filter-btn active" data-level="all"     onclick="setFilter('all')">ALL</button>
    <button class="filter-btn"        data-level="Annual"  onclick="setFilter('Annual')">Annual</button>
    <button class="filter-btn"        data-level="Monthly" onclick="setFilter('Monthly')">Monthly</button>
    <button class="filter-btn"        data-level="Weekly"  onclick="setFilter('Weekly')">Weekly</button>
    <button class="filter-btn"        data-level="Daily"   onclick="setFilter('Daily')">Daily</button>
  </div>
  <div class="header-right">
    <span class="count-label" id="count-label"></span>
    <button class="url-settings-btn" onclick="showUrlSetup()" title="GAS URL を変更">⚙️</button>
  </div>
</header>

<div id="timeline">
  <div id="loading">
    <div class="spinner"></div>
    <span>データ読み込み中...</span>
  </div>
</div>

<script>
  const GP_STORAGE_KEY = 'gp_public_v1';
  let allEntries = [];
  let currentFilter = 'all';

  function loadStorage() {
    try { return JSON.parse(localStorage.getItem(GP_STORAGE_KEY) || '{}'); } catch(e) { return {}; }
  }
  function saveStorage(data) {
    try { localStorage.setItem(GP_STORAGE_KEY, JSON.stringify({ ...loadStorage(), ...data })); } catch(e) {}
  }

  // ── 初期化 ──────────────────────────────────
  window.onload = function() {
    const stored = loadStorage();
    const gasUrl = stored.timelineGasUrl || '';
    if (!gasUrl) {
      showUrlSetup();
      return;
    }
    loadData(gasUrl);
  };

  function loadData(gasUrl) {
    fetch(gasUrl + '?page=timeline_data', { redirect: 'follow' })
      .then(function(r) { return r.json(); })
      .then(onDataLoaded)
      .catch(function(e) { onError(e); });
  }

  function onDataLoaded(data) {
    allEntries = Array.isArray(data) ? data : (typeof data === 'string' ? JSON.parse(data) : []);
    render();
  }

  function onError(e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#F87171;text-align:center;padding:20px;">読み込みエラー: ' + (e.message || String(e)) + '<br><br><span style="font-size:12px;color:#94A3B8;">⚙️ ボタンから GAS URL を確認してください</span></p>';
  }

  // ── URL設定 ──────────────────────────────────
  function showUrlSetup() {
    const stored = loadStorage();
    const input = document.getElementById('setup-url-input');
    input.value = stored.timelineGasUrl || '';
    document.getElementById('url-setup').style.display = 'flex';
  }

  function saveUrlSetup() {
    const url = document.getElementById('setup-url-input').value.trim();
    if (!url || !url.includes('/macros/s/')) {
      alert('正しい GAS ウェブアプリ URL（/exec で終わるURL）を入力してください');
      return;
    }
    const btn = document.getElementById('setup-connect-btn');
    btn.disabled = true; btn.textContent = '接続中...';
    saveStorage({ timelineGasUrl: url });
    document.getElementById('url-setup').style.display = 'none';
    document.getElementById('timeline').innerHTML = '<div id="loading"><div class="spinner"></div><span>データ読み込み中...</span></div>';
    btn.disabled = false; btn.textContent = '接続する';
    loadData(url);
  }

  function goBack() {
    window.location.href = './index.html';
  }

  // ── フィルター ───────────────────────────────
  function setFilter(level) {
    currentFilter = level;
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.level === level);
    });
    render();
  }

  // ── レンダリング ─────────────────────────────
  function render() {
    const container = document.getElementById('timeline');
    const filtered = currentFilter === 'all'
      ? allEntries
      : allEntries.filter(function(e) { return e.level === currentFilter; });

    document.getElementById('count-label').textContent = filtered.length + ' 件';

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">表示できるエントリーがありません</div>';
      return;
    }

    container.innerHTML = filtered.map(function(e, i) { return buildCard(e, i); }).join('');
  }

  // ── カード生成 ───────────────────────────────
  function buildCard(e, i) {
    const delay = Math.min(i * 30, 400);
    let inner = '';

    inner += '<div class="card-header">' +
      '<span class="level-badge">' + e.level + '</span>' +
      '<span class="date-label">' + esc(e.date_range || e.date || e.id || '') + '</span>' +
      (e.emotion ? '<span class="emotion-chip">' + esc(e.emotion) + '</span>' : '') +
      '</div>';

    if (e.summary) {
      inner += '<p class="summary">' + esc(e.summary) + '</p>';
    }

    if (e.keystone) {
      inner += '<div class="section"><div class="section-label">💡 Keystone Insight</div>' +
        '<p class="keystone">' + esc(e.keystone) + '</p></div>';
    }

    if (e.level === 'Weekly' || e.level === 'Monthly') {
      if (e.top3_plan) {
        inner += '<div class="section"><div class="section-label">🎯 Top3 Plan</div>' +
          '<p class="section-text">' + esc(e.top3_plan) + '</p></div>';
      }
      if (e.top3_actual) {
        inner += '<div class="section"><div class="section-label">✅ Top3 Actual</div>' +
          '<p class="section-text">' + esc(e.top3_actual) + '</p></div>';
      }
      if (e.aphorism) {
        inner += '<div class="section"><div class="section-label">✨ Aphorism Candidate</div>' +
          '<p class="aphorism">"' + esc(e.aphorism) + '"</p></div>';
      }
    }

    if (e.level === 'Monthly') {
      if (e.major_breakthrough) {
        inner += '<div class="section"><div class="section-label">🚀 Major Breakthrough</div>' +
          '<p class="section-text">' + esc(e.major_breakthrough) + '</p></div>';
      }
      if (e.identity_evolution) {
        inner += '<div class="section"><div class="section-label">🦋 Identity Evolution</div>' +
          '<p class="section-text">' + esc(e.identity_evolution) + '</p></div>';
      }
      if (e.teaching) {
        inner += '<div class="section"><div class="section-label">📖 Teaching</div>' +
          '<p class="section-text">' + esc(e.teaching) + '</p></div>';
      }
    }

    if (e.level === 'Annual') {
      if (e.year_philosophy) {
        inner += '<div class="section"><div class="section-label">🌍 Year Philosophy</div>' +
          '<p class="section-text">' + esc(e.year_philosophy) + '</p></div>';
      }
      if (e.aphorisms_confirmed) {
        inner += '<div class="section"><div class="section-label">💎 Aphorisms Confirmed</div>' +
          '<p class="aphorism">' + esc(e.aphorisms_confirmed) + '</p></div>';
      }
      if (e.legacy_testament) {
        inner += '<div class="section"><div class="section-label">🏛 Legacy Testament</div>' +
          '<p class="section-text">' + esc(e.legacy_testament) + '</p></div>';
      }
    }

    return '<div class="entry" data-level="' + e.level + '" style="animation-delay:' + delay + 'ms">' +
      '<div class="dot"></div><div class="card">' + inner + '</div></div>';
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
